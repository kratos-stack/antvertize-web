name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Audit production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Render Lighthouse summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = '.lighthouseci';
            if (!fs.existsSync(dir)) {
              core.warning('No .lighthouseci directory found; skipping Lighthouse summary.');
              return;
            }

            const manifestFile = fs.readdirSync(dir).find(f => f.startsWith('manifest') && f.endsWith('.json'));
            if (!manifestFile) {
              core.warning('No Lighthouse manifest file found; skipping Lighthouse summary.');
              return;
            }
            const manifest = JSON.parse(fs.readFileSync(`${dir}/${manifestFile}`, 'utf8'));
            const median = manifest.filter(r => r.isRepresentativeRun);

            let assertions = [];
            const assertionsPath = `${dir}/assertion-results.json`;
            if (fs.existsSync(assertionsPath)) {
              try {
                assertions = JSON.parse(fs.readFileSync(assertionsPath, 'utf8'));
              } catch (err) {
                core.warning(`Failed to parse assertion-results.json: ${err.message}`);
              }
            }

            const failed = assertions.filter(a => a.level === 'error');
            const warned = assertions.filter(a => a.level === 'warn');
            const passEmoji = failed.length ? '❌' : (warned.length ? '⚠️' : '✅');
            const headline = failed.length
              ? `${passEmoji} ${failed.length} required assertion(s) failed`
              : warned.length
                ? `${passEmoji} ${warned.length} non-blocking warning(s)`
                : `${passEmoji} All assertions passed`;

            const dot = (v) => {
              if (v == null) return '⚪';
              if (v >= 0.9) return '🟢';
              if (v >= 0.8) return '🟡';
              return '🔴';
            };
            const fmt = (v) => v == null ? 'n/a' : `${dot(v)} ${(v * 100).toFixed(0)}`;
            const route = (url) => url.replace('http://localhost:4173', '') || '/';

            const scoreRows = median.map(r => {
              const s = r.summary;
              const reportLink = r.htmlPath ? `[html](${r.htmlPath})` : '—';
              const publicLink = r.url ? `[live](${r.url})` : '';
              const links = [reportLink, publicLink].filter(Boolean).join(' · ');
              return `| \`${route(r.url)}\` | ${fmt(s.performance)} | ${fmt(s.accessibility)} | ${fmt(s['best-practices'])} | ${fmt(s.seo)} | ${links} |`;
            });

            const assertionRows = [...failed, ...warned].slice(0, 25).map(a => {
              const icon = a.level === 'error' ? '❌' : '⚠️';
              const actual = typeof a.actual === 'number' ? a.actual.toFixed(2) : String(a.actual);
              const expected = typeof a.expected === 'number' ? a.expected.toFixed(2) : String(a.expected);
              return `| ${icon} | \`${route(a.url)}\` | \`${a.auditId}\` | ${a.operator} ${expected} | ${actual} |`;
            });

            const lines = [
              '## 🚦 Lighthouse CI',
              '',
              `**${headline}** · median of ${manifest.length / Math.max(median.length, 1)} run(s) per route`,
              '',
              '### Scores',
              '',
              '| Route | Perf | A11y | Best Practices | SEO | Report |',
              '| --- | :---: | :---: | :---: | :---: | --- |',
              ...scoreRows,
              '',
              '_🟢 ≥ 90 · 🟡 ≥ 80 · 🔴 < 80_',
            ];

            if (assertionRows.length) {
              lines.push(
                '',
                '### Assertion results',
                '',
                '| | Route | Audit | Threshold | Actual |',
                '| :---: | --- | --- | --- | ---: |',
                ...assertionRows,
              );
              if (failed.length + warned.length > assertionRows.length) {
                lines.push('', `_…and ${failed.length + warned.length - assertionRows.length} more. See the full report for details._`);
              }
            }

            lines.push(
              '',
              `_Thresholds: a11y ≥ 80 (required), perf/bp/seo ≥ 80 (warn). Workflow run: [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})._`,
            );

            const body = lines.join('\n');

            await core.summary.addRaw(body).write();

            if (context.eventName === 'pull_request' && context.issue.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
