name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Audit production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.lighthouseci';
            if (!fs.existsSync(path)) {
              core.info('No .lighthouseci directory found; skipping comment.');
              return;
            }
            const files = fs.readdirSync(path).filter(f => f.startsWith('manifest') && f.endsWith('.json'));
            if (files.length === 0) {
              core.info('No manifest file found; skipping comment.');
              return;
            }
            const manifest = JSON.parse(fs.readFileSync(`${path}/${files[0]}`, 'utf8'));
            const median = manifest.filter(r => r.isRepresentativeRun);
            const rows = median.map(r => {
              const s = r.summary;
              const fmt = (v) => v == null ? 'n/a' : (v * 100).toFixed(0);
              return `| ${r.url.replace('http://localhost:4173', '') || '/'} | ${fmt(s.performance)} | ${fmt(s.accessibility)} | ${fmt(s['best-practices'])} | ${fmt(s.seo)} | [report](${r.url}) |`;
            });
            const body = [
              '### Lighthouse CI results',
              '',
              '| Route | Perf | A11y | Best Practices | SEO | Run |',
              '| --- | ---: | ---: | ---: | ---: | --- |',
              ...rows,
              '',
              '_Median of 3 runs · thresholds: a11y ≥ 95 (required), perf/bp/seo ≥ 85/90/95 (warn). Full reports linked above._',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
